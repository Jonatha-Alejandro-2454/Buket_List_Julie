<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Diario de Aventuras</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Importación de Tipografías Premium -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --rose-600: #e11d48;
            --rose-500: #f43f5e;
            --rose-400: #fb7185;
            --accent-font: 'Dancing Script', cursive;
            --main-font: 'Montserrat', sans-serif;
        }

        body {
            font-family: var(--main-font);
            background: linear-gradient(-45deg, #fff1f2, #ffe4e6, #fecdd3, #fff1f2);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            position: relative;
        }

        /* Fondo de destellos en lugar de corazones */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.12;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5l2 10 10 2-10 2-2 10-2-10-10-2 10-2zM50 40l1 5 5 1-5 1-1 5-1-5-5-1 5-1z' fill='%23e11d48'/%3E%3C/svg%3E");
            z-index: -1;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header-title {
            font-family: var(--accent-font);
            background: linear-gradient(to right, #be123c, #e11d48, #db2777);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 2px rgba(225, 29, 72, 0.1));
        }

        .place-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
        }
        
        .place-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(225, 29, 72, 0.15);
        }

        .place-card.completed {
            background-color: rgba(243, 244, 246, 0.85);
            filter: grayscale(0.2);
            transform: scale(0.97);
            border: 2px solid var(--rose-400);
        }

        .check-badge { display: none; }
        .completed .check-badge { display: flex; }

        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #fb7185; border-radius: 10px; }

        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }

        .btn-premium {
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(225, 29, 72, 0.1);
        }
        .btn-premium:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(225, 29, 72, 0.2);
        }
    </style>
</head>

    <main class="max-w-7xl mx-auto p-4 md:p-8 lg:p-12 mb-20">

        <div id="no-results" class="hidden text-center py-24">

                <i class="fas fa-sparkles text-rose-300 text-5xl"></i>
            </div>
            <p class="text-rose-500 text-xl font-bold">¡Pronto añadiremos más aventuras! ✨</p>
        </div>
    </main>

            { id: 57, name: "Museo Nacional de la Acuarela", category: "museos", description: "El primer museo del mundo dedicado a esta técnica.", location: "Coyoacán, CDMX", maps: "https://www.google.com/maps/search/Museo+de+la+Acuarela", img: "https://images.unsplash.com/photo-1541963463532-d68292c34b19?w=600" },

            { id: 61, name: "Museo Anahuacalli", category: "museos", description: "Construido por Diego Rivera para albergar arte prehispánico.", location: "Coyoacán, CDMX", maps: "https://www.google.com/maps/search/Museo+Anahuacalli", img: "https://images.unsplash.com/photo-1518998053574-53ee7511c73b?w=600" },

            { id: 68, name: "Museo Casa Estudio Diego Rivera y Frida Kahlo", category: "museos", description: "Espacio funcionalista icónico.", location: "San Ángel, CDMX", maps: "https://www.google.com/maps/search/Casa+Estudio+Diego+Rivera", img: "https://images.unsplash.com/photo-1513364776144-60967b0f800f?w=600" },
            { id: 69, name: "Museo Nacional de las Culturas del Mundo", category: "museos", description: "Recorrido por civilizaciones globales.", location: "Centro, CDMX", maps: "https://www.google.com/maps/search/Museo+Nacional+de+las+Culturas", img: "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=600" },
            { id: 70, name: "Museo del Ejército y Fuerza Aérea", category: "museos", description: "Historia militar mexicana.", location: "Centro Histórico, CDMX", maps: "https://www.google.com/maps/search/Museo+del+Ejercito", img: "https://images.unsplash.com/photo-1590247813693-5541d1c609fd?w=600" }
        ];

        let completedIds = JSON.parse(localStorage.getItem('my_date_tracker')) || [];

        function init() {
            renderPlaces(places);
            updateProgress();
        }

        function renderPlaces(data) {
            const grid = document.getElementById('places-grid');
            const noResults = document.getElementById('no-results');

            if (data.length === 0) {
                grid.innerHTML = '';
                noResults.classList.remove('hidden');
                return;
            }

            noResults.classList.add('hidden');
            grid.innerHTML = data.map((place, index) => {
                const isCompleted = completedIds.includes(place.id);
                return `
                <div class="place-card rounded-[2rem] shadow-md border border-rose-100 overflow-hidden relative group ${isCompleted ? 'completed' : ''}" id="card-${place.id}" style="animation: fadeIn 0.4s ease forwards ${index * 0.03}s">
                    <div class="relative h-48 md:h-56 overflow-hidden">
                        <img src="${place.img}" 
                             alt="${place.name}" 
                             class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-1000" 
                             loading="lazy"
                             onerror="this.onerror=null; this.src='${FALLBACK_IMG}';">
                        <div class="check-badge absolute inset-0 bg-rose-600/30 backdrop-blur-[2px] items-center justify-center">
                            <div class="bg-white rounded-full p-4 shadow-2xl transform scale-125">
                                <i class="fas fa-star text-rose-500 text-xl"></i>
                            </div>
                        </div>
                    </div>
                    <div class="p-5 md:p-6">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-black text-gray-800 text-lg leading-tight pr-3">${place.name}</h3>
                            <input type="checkbox" ${isCompleted ? 'checked' : ''} onchange="toggleComplete(${place.id})" class="w-6 h-6 accent-rose-500 rounded-full cursor-pointer shadow-sm">
                        </div>
                        <p class="text-[10px] font-black text-rose-500 uppercase tracking-widest mb-3">${place.category}</p>
                        <div class="flex items-center gap-2 text-gray-500 text-xs mb-5 font-semibold">
                            <i class="fas fa-location-dot text-rose-400"></i>
                            <span class="truncate">${place.location}</span>
                        </div>
                        <button onclick="openDetails(${place.id})" class="btn-premium w-full py-3 bg-rose-50 text-rose-600 rounded-2xl font-black text-[11px] uppercase tracking-wider hover:bg-rose-500 hover:text-white transition-all">
                            Detalles
                        </button>
                    </div>
                </div>
                `;
            }).join('');
        }

        function toggleComplete(id) {
            const index = completedIds.indexOf(id);
            const card = document.getElementById(`card-${id}`);
            if (index > -1) {
                completedIds.splice(index, 1);
                card.classList.remove('completed');
            } else {
                completedIds.push(id);
                card.classList.add('completed');
            }
            localStorage.setItem('my_date_tracker', JSON.stringify(completedIds));
            updateProgress();
        }

        function updateProgress() {
            const total = places.length;
            const completed = completedIds.length;
            const percentage = (completed / total) * 100;
            document.getElementById('progress-bar').style.width = percentage + '%';
            document.getElementById('progress-text').innerText = `${completed}/${total}`;
            const status = document.getElementById('progress-status');
            if (percentage === 0) status.innerText = "¡La aventura comienza aquí! ✨";
            else if (percentage < 30) status.innerText = "¡Estamos creando recuerdos! 🌟";
            else if (percentage < 70) status.innerText = "¡Wow, llevamos muchísimos! 🚀";
            else if (percentage < 100) status.innerText = "¡Casi completamos nuestro mundo! ⭐";
            else status.innerText = "¡AVENTURA COMPLETADA! ERES LA MEJOR 🏆";
        }

        function filterPlaces(category, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.remove('bg-rose-500', 'text-white', 'shadow-md');
                b.classList.add('bg-white/80', 'text-rose-600');
            });
            btn.classList.add('bg-rose-500', 'text-white', 'shadow-md');
            btn.classList.remove('bg-white/80', 'text-rose-600');
            const filtered = category === 'todos' ? places : places.filter(p => p.category === category);
            renderPlaces(filtered);
        }

        function openDetails(id) {
            const place = places.find(p => p.id === id);
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <div class="relative h-64 sm:h-80">
                    <img src="${place.img}" onerror="this.onerror=null; this.src='${FALLBACK_IMG}';" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
                    <div class="absolute bottom-6 left-6 right-6">
                        <p class="text-rose-400 text-xs font-black uppercase tracking-[0.2em] mb-2">${place.category}</p>
                        <h2 class="text-3xl sm:text-4xl font-black text-white leading-tight">${place.name}</h2>
                    </div>
                </div>
                <div class="p-8">
                    <div class="flex items-center gap-3 mb-6 bg-rose-50 p-4 rounded-2xl border border-rose-100">
                        <i class="fas fa-map-location-dot text-rose-500 text-lg"></i>
                        <span class="text-sm font-bold text-gray-700">${place.location}</span>
                    </div>
                    <p class="text-gray-600 text-lg leading-relaxed italic mb-8 font-medium">"${place.description}"</p>
                    <a href="${place.maps}" target="_blank" class="flex items-center justify-center gap-3 w-full py-5 bg-gradient-to-r from-rose-500 to-rose-600 text-white rounded-2xl font-black shadow-xl shadow-rose-200 hover:scale-[1.02] transition-all active:scale-95 text-sm uppercase tracking-widest">
                        <i class="fas fa-directions text-xl"></i> Ver ruta en Mapas
                    </a>
                </div>
            `;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        window.onclick = (e) => { if (e.target == document.getElementById('modal')) closeModal(); }
        window.onload = init;
    </script>
</body>
</html>
