<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo de Aventuras.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #f43f5e;
            --primary-light: #fff1f2;
            --bg-silk: #fffafb;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            background: linear-gradient(-45deg, #fffafb, #fff1f2, #ffe4e6, #fffafb);
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
            color: #1e293b;
            min-height: 100vh;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.12;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5l2 10 10 2-10 2-2 10-2-10-10-2 10-2zM50 40l1 5 5 1-5 1-1 5-1-5-5-1 5-1z' fill='%23e11d48'/%3E%3C/svg%3E");
            z-index: -1;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .world-container {
            position: relative;
            width: 50px;
            height: 50px;
            perspective: 1000px;
        }

        .world-sphere {
            width: 100%;
            height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Blue_Marble_2002.png/600px-Blue_Marble_2002.png');
            background-size: cover;
            border-radius: 50%;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.4), 0 0 15px rgba(244, 63, 94, 0.3);
            animation: rotateWorld 10s linear infinite;
            position: relative;
            border: 1px solid rgba(255,255,255,0.2);
        }

        @keyframes rotateWorld {
            from { background-position: 0 0; }
            to { background-position: 200% 0; }
        }

        .world-ring {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotateX(75deg);
            width: 70px;
            height: 70px;
            border: 2px solid rgba(244, 63, 94, 0.2);
            border-radius: 50%;
            pointer-events: none;
        }

        .accent-font { font-family: 'Dancing Script', cursive; }
        
        .glass-header {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .romantic-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        
        .romantic-card:hover:not(.visited-card) {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 25px 50px -12px rgba(244, 63, 94, 0.15);
            border-color: rgba(244, 63, 94, 0.2);
        }

        .visited-card {
            opacity: 0.6;
            filter: grayscale(0.4);
            transform: scale(0.98);
        }

        .filter-btn {
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            background: #f43f5e !important;
            color: white !important;
            border-color: #f43f5e !important;
            box-shadow: 0 8px 15px -5px rgba(244, 63, 94, 0.3);
        }

        .empty-state {
            grid-column: 1 / -1;
            padding: 4rem 1rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 3rem;
            border: 2px dashed rgba(244, 63, 94, 0.2);
            margin: 2rem 0;
        }
    </style>
</head>

    <header class="sticky top-0 z-50 glass-header py-6 px-8">

            <div class="flex items-center gap-5">

                    <div class="world-sphere"></div>
                    <div class="world-ring"></div>
                </div>
                <div>
                    <h1 class="text-3xl font-800 tracking-tight text-slate-900">MUNDO <span class="text-rose-500 accent-font text-4xl ml-1">de Aventuras</span></h1>
                    <p class="text-[9px] uppercase tracking-[0.4em] text-rose-500 font-bold mt-1 text-center sm:text-left">Coleccionando momentos, un lugar a la vez</p>
                </div>
            </div>
            
            <div class="bg-white/40 p-2 rounded-[2.5rem] flex items-center gap-6 shadow-lg border border-white/60">
                <div class="flex items-center gap-4 px-4 py-1">

                        <svg class="w-14 h-14 transform -rotate-90">
                            <circle cx="28" cy="28" r="24" stroke="currentColor" stroke-width="4" fill="transparent" class="text-rose-50" />
                            <circle id="progress-circle" cx="28" cy="28" r="24" stroke="currentColor" stroke-width="4" fill="transparent" stroke-dasharray="150.8" stroke-dashoffset="150.8" class="text-rose-500 transition-all duration-1000" stroke-linecap="round" />
                        </svg>
                        <span id="progress-percent" class="absolute text-[11px] font-800 text-rose-600">0%</span>
                    </div>
                    <div>
                        <div class="flex items-baseline gap-1">
                            <span id="visited-count" class="text-2xl font-800 text-slate-800">0</span>
                            <span class="text-xs font-bold text-slate-300">/</span>
                            <span class="text-xs font-bold text-slate-400">70</span>
                        </div>
                        <span class="text-[9px] font-black text-slate-400 block uppercase tracking-tighter">Lugares visitados</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="mb-12 space-y-8">
            <div class="relative max-w-2xl mx-auto">
                <i class="fa-solid fa-magnifying-glass absolute left-6 top-1/2 -translate-y-1/2 text-rose-300"></i>
                <input type="text" id="searchInput" placeholder="¿A dónde iremos hoy, Jonathan?" 
                    class="w-full pl-16 pr-10 py-5 rounded-full bg-white/60 backdrop-blur-md shadow-xl border border-white focus:ring-4 focus:ring-rose-100 outline-none text-lg transition-all">
            </div>
            
            <div class="flex flex-wrap justify-center gap-2" id="filterContainer">
                <button onclick="filterBy('all')" id="btn-all" class="filter-btn active px-6 py-2.5 rounded-full text-[9px] font-bold uppercase tracking-widest bg-white/60 text-slate-500 border border-white shadow-sm">Todos</button>
                <button onclick="filterBy('favs')" id="btn-favs" class="filter-btn px-6 py-2.5 rounded-full text-[9px] font-bold uppercase tracking-widest bg-white/60 text-rose-400 border border-rose-50 shadow-sm">
                    <i class="fa-solid fa-heart mr-2"></i>Favs
                </button>
            </div>
        </div>

        <div id="placesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    </main>

    <div id="modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-6 bg-slate-900/30 backdrop-blur-md">

            { id: 60, name: "Restaurante Bestia", category: "comida", description: "Sabor audaz y ambiente vibrante en Polanco.", location: "Polanco, CDMX", img: "https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=800" },

            // PUEBLOS (7)
            { id: 61, name: "Tepoztlán", category: "pueblos", description: "Misticismo, caminata al Tepozteco y comida tradicional.", location: "Morelos", img: "https://images.unsplash.com/photo-1595116743431-7e8751528657?w=800" },
            { id: 62, name: "Huasca de Ocampo", category: "pueblos", description: "Prismas Basálticos y el museo de los duendes.", location: "Hidalgo", img: "https://images.unsplash.com/photo-1527443154391-507e9dc6c5cc?w=800" },
            { id: 63, name: "Peña de Bernal", category: "pueblos", description: "Uno de los monolitos más grandes del mundo.", location: "Querétaro", img: "https://images.unsplash.com/photo-1578330132822-0196887afecb?w=800" },
            { id: 64, name: "Mineral del Chico", category: "pueblos", description: "Paisajes boscosos y actividades de montaña.", location: "Hidalgo", img: "https://images.unsplash.com/photo-1444464666168-49d633b867ad?w=800" },
            { id: 65, name: "Valle de Bravo", category: "pueblos", description: "Lago artificial, deportes acuáticos y atardeceres.", location: "Edo Mex", img: "https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=800" },
            { id: 66, name: "Real del Monte", category: "pueblos", description: "Pueblo minero conocido por sus tradicionales pastes.", location: "Hidalgo", img: "https://images.unsplash.com/photo-1516483638261-f4dbaf036963?w=800" },
            { id: 67, name: "Malinalco", category: "pueblos", description: "Zona arqueológica única tallada en el cerro.", location: "Edo Mex", img: "https://images.unsplash.com/photo-1606298244116-0141a44cd3c0?w=800" },

            // ACUARIOS (2)
            { id: 68, name: "Acuario Inbursa", category: "acuarios", description: "Vida marina profunda en el corazón de la ciudad.", location: "Polanco, CDMX", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Acuario_Inbursa_2015.JPG/800px-Acuario_Inbursa_2015.JPG" }, 
            { id: 69, name: "Acuario Michin", category: "acuarios", description: "Acuario interactivo con granjas y muros de escalar.", location: "CDMX", img: "https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=800" },

            // ESPECIALES (1)
            { id: 70, name: "Basílica de Guadalupe", category: "especiales", description: "Uno de los santuarios más visitados del mundo.", location: "CDMX", img: "https://images.unsplash.com/photo-1610123598195-90f15509599a?w=800" } 
        ];

        const categoryLabels = {
            acuarios: "Acuarios",
            cafeterias: "Cafecitos",
            comida: "Comida",
            especiales: "Especiales",
            museos: "Museos",
            parques: "Parques",
            pueblos: "Pueblos"
        };

        let visited = JSON.parse(localStorage.getItem('voyager_v2_visited')) || [];
        let favorites = JSON.parse(localStorage.getItem('voyager_v2_favs')) || [];
        let currentFilter = 'all';

        function init() {
            createFilterButtons();
            renderGrid();
            updateStats();
        }

        function createFilterButtons() {
            const container = document.getElementById('filterContainer');
            const categories = [...new Set(rawData.map(p => p.category))].sort();
            
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.onclick = () => filterBy(cat);
                btn.id = `btn-${cat}`;
                btn.className = 'filter-btn px-6 py-2.5 rounded-full text-[9px] font-bold uppercase tracking-widest bg-white/60 text-slate-500 border border-white shadow-sm';
                btn.innerText = categoryLabels[cat] || cat;
                container.appendChild(btn);
            });
        }

        function filterBy(cat) {
            currentFilter = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${cat}`).classList.add('active');
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('placesGrid');
            const searchInput = document.getElementById('searchInput');
            const search = searchInput.value.toLowerCase();
            
            // Primero aplicamos búsqueda y filtros de categoría
            let filtered = rawData.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(search) || p.location.toLowerCase().includes(search);
                const matchesCat = currentFilter === 'all' || 
                                 (currentFilter === 'favs' && favorites.includes(p.id)) || 
                                 p.category === currentFilter;
                return matchesSearch && matchesCat;
            });

            // Lógica de ordenamiento: 
            // 1. Los no visitados van primero.
            // 2. Dentro de cada grupo, ordenamos alfabéticamente.
            filtered.sort((a, b) => {
                const aVisited = visited.includes(a.id);
                const bVisited = visited.includes(b.id);
                
                if (aVisited && !bVisited) return 1;  // 'a' es visitado, va después
                if (!aVisited && bVisited) return -1; // 'a' no es visitado, va antes
                
                // Si ambos tienen el mismo estado de visita, ordenar alfabéticamente
                return a.name.localeCompare(b.name);
            });

            if (filtered.length === 0) {
                if (currentFilter === 'favs') {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <div class="text-rose-200 text-6xl mb-6"><i class="fa-solid fa-heart-circle-plus"></i></div>
                            <h3 class="text-slate-800 font-800 text-xl mb-2 italic accent-font text-3xl">¡Tus favoritos están vacíos!</h3>
                            <p class="text-slate-400 text-[10px] uppercase font-bold tracking-[0.2em] max-w-xs mx-auto">Busca lugares increíbles y presiona el corazón para guardarlos aquí.</p>
                        </div>
                    `;
                } else {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <div class="text-slate-200 text-6xl mb-6"><i class="fa-solid fa-map-location-dot"></i></div>
                            <h3 class="text-slate-800 font-800 text-xl mb-2 italic accent-font text-3xl">Sin resultados</h3>
                            <p class="text-slate-400 text-[10px] uppercase font-bold tracking-[0.2em]">No encontramos nada con "${search}"</p>
                        </div>
                    `;
                }
                return;
            }

            grid.innerHTML = filtered.map(p => {
                const isFav = favorites.includes(p.id);
                const isVisited = visited.includes(p.id);
                return `
                    <div class="romantic-card rounded-[2.5rem] overflow-hidden flex flex-col ${isVisited ? 'visited-card' : ''}">
                        <div class="relative h-56 overflow-hidden cursor-pointer" onclick="openModal(${p.id})">
                            <img src="${p.img}" onerror="this.src='https://images.unsplash.com/photo-1518101645466-7795885ff8f8?w=800'" class="w-full h-full object-cover transition-transform duration-700 hover:scale-110">
                            <span class="absolute top-4 left-4 px-3 py-1 bg-black/40 backdrop-blur-md rounded-full text-[8px] font-black uppercase tracking-widest text-white">${categoryLabels[p.category]}</span>
                        </div>
                        <div class="p-7 flex-grow flex flex-col">
                            <div class="flex justify-between items-start gap-2 mb-1">
                                <h3 class="font-800 text-slate-800 text-base leading-tight">${p.name}</h3>
                                <button onclick="toggleFav(${p.id})" class="text-xl transition-transform active:scale-125 hover:scale-110">
                                    <i class="fa-solid fa-heart ${isFav ? 'text-rose-500' : 'text-slate-200'}"></i>
                                </button>
                            </div>
                            <p class="text-[9px] font-bold text-rose-400 uppercase tracking-widest mb-6"><i class="fa-solid fa-location-dot"></i> ${p.location}</p>
                            <div class="mt-auto pt-5 border-t border-rose-50 flex items-center justify-between">
                                <button onclick="toggleVisited(${p.id})" class="flex items-center gap-2 group">
                                    <div class="w-7 h-7 rounded-lg border flex items-center justify-center transition-all ${isVisited ? 'bg-rose-500 border-rose-500' : 'border-rose-100 group-hover:border-rose-200'}">
                                        <i class="fa-solid fa-check text-[10px] text-white ${isVisited ? '' : 'hidden'}"></i>
                                    </div>
                                    <span class="text-[9px] font-900 uppercase tracking-tighter ${isVisited ? 'text-rose-500' : 'text-slate-300'}">${isVisited ? 'Visto' : 'Pendiente'}</span>
                                </button>
                                <button onclick="openModal(${p.id})" class="text-[9px] font-900 text-rose-300 hover:text-rose-600 uppercase tracking-widest">Info</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleFav(id) {
            if (favorites.includes(id)) {
                favorites = favorites.filter(f => f !== id);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('voyager_v2_favs', JSON.stringify(favorites));
            renderGrid();
        }

        function toggleVisited(id) {
            visited = visited.includes(id) ? visited.filter(v => v !== id) : [...visited, id];
            localStorage.setItem('voyager_v2_visited', JSON.stringify(visited));
            updateStats();
            renderGrid();
        }

        function updateStats() {
            const count = visited.length;
            const total = 70;
            const percent = Math.round((count/total)*100);
            document.getElementById('visited-count').innerText = count;
            document.getElementById('progress-percent').innerText = `${percent}%`;
            document.getElementById('progress-circle').style.strokeDashoffset = 150.8 - (percent/100)*150.8;
        }

        function openModal(id) {
            const p = rawData.find(x => x.id === id);
            document.getElementById('modalContent').innerHTML = `
                <div class="relative h-64">
                    <img src="${p.img}" class="w-full h-full object-cover">
                    <button onclick="closeModal()" class="absolute top-6 right-6 w-10 h-10 bg-black/20 text-white rounded-full backdrop-blur-md flex items-center justify-center hover:bg-black/40"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="p-10 bg-white">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="px-2 py-0.5 bg-rose-50 text-rose-500 text-[8px] font-black uppercase tracking-widest rounded-md">${categoryLabels[p.category]}</span>
                        <h2 class="text-3xl font-800 text-slate-800">${p.name}</h2>
                    </div>
                    <p class="text-rose-500 text-[10px] font-bold uppercase tracking-[0.2em] mb-6">${p.location}</p>
                    <p class="text-slate-500 italic accent-font text-3xl mb-10 leading-relaxed">"${p.description}"</p>
                    <a href="https://www.google.com/maps/search/${encodeURIComponent(p.name + ' ' + p.location)}" target="_blank" class="block w-full py-5 bg-rose-500 text-white rounded-2xl text-center font-bold text-xs uppercase tracking-[0.3em] shadow-xl shadow-rose-100 transition-all hover:bg-rose-600 active:scale-95">Ver Ubicación</a>
                </div>
            `;
            document.getElementById('modal').classList.remove('hidden');
            setTimeout(() => document.getElementById('modalContainer').classList.remove('scale-95', 'opacity-0'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modalContainer').classList.add('scale-95', 'opacity-0');
            setTimeout(() => { document.getElementById('modal').classList.add('hidden'); document.body.style.overflow = 'auto'; }, 300);
        }

        document.getElementById('searchInput').addEventListener('input', renderGrid);
        window.onload = init;
    </script>
</body>
</html>
